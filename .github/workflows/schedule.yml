name: Daily AutoShorts Generator

on:
  schedule:
    - cron: '0 13 * * *' # Runs at 13:00 UTC (10:00 AM Argentina/Brazil)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        style: [curiosity, what_if, top_3]
      fail-fast: false # If one fails, let others continue

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (ImageMagick & FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ffmpeg
        # Fix ImageMagick policy to allow PDF/text operations if needed by MoviePy
        sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AutoShorts Generator (${{ matrix.style }})
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        VIDEO_COUNT: 2
        VIDEO_STYLE: ${{ matrix.style }}
      run: python main.py

    - name: Debug - List Output
      if: always()
      run: ls -R output/ || echo "Output dir not found"

    - name: Upload Video Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: daily-shorts-${{ matrix.style }}
        path: output/
        retention-days: 5
