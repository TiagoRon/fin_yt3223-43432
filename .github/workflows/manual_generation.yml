name: Manual Video Generation
run-name: "Gen: ${{ inputs.video_style }} - ${{ inputs.video_topic }} (#${{ github.run_number }})"

on:
  workflow_dispatch:
    inputs:
      video_count:
        description: 'Number of videos to generate'
        required: true
        default: '1'
      video_style:
        description: 'Style of the video'
        required: true
        type: choice
        options:
          - curiosity
          - what_if
          - top_3
          - dark_facts
          - history
          - custom
        default: 'curiosity'
      video_topic:
        description: 'Specific Topic (leave blank for random/trends)'
        required: false
        default: ''
      watermark_text:
        description: 'Watermark Text'
        required: false
        default: '@AIShortsGenerator'
      language:
        description: 'Language Code (e.g. es, en)'
        required: false
        default: 'es'

jobs:
  generate_manual:
    name: Generate Cloud Videos
    runs-on: ubuntu-latest
    
    permissions:
      actions: write
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (ImageMagick & FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ffmpeg zip
        sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up YouTube Cookies (Optional)
      env:
        YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
      run: |
        if [ -n "$YOUTUBE_COOKIES" ]; then
          echo "# Netscape HTTP Cookie File" > cookies.txt
          echo "# https://curl.haxx.se/rfc/cookie_spec.html" >> cookies.txt
          echo "# This is a generated file! Do not edit." >> cookies.txt
          echo "" >> cookies.txt
          echo "$YOUTUBE_COOKIES" | tr -d '\r' | awk '!/^$/ && !/^#/ && !/esto/ {print}' >> cookies.txt
          head -n 5 cookies.txt || true
          echo "Cookies saved and verified via Unix tools."
        fi

    - name: Run Cloud Video Generation
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        VIDEO_COUNT: ${{ github.event.inputs.video_count }}
        VIDEO_STYLE: ${{ github.event.inputs.video_style }}
        VIDEO_TOPIC: ${{ github.event.inputs.video_topic }}
        WATERMARK_TEXT: ${{ github.event.inputs.watermark_text }}
        LANGUAGE: ${{ github.event.inputs.language }}
      run: python cloud_main.py

    - name: Commit & Push History (Prevent Duplicates)
      continue-on-error: true
      run: |
        git config user.name "AutoShorts Bot"
        git config user.email "actions@github.com"
        git pull origin main --rebase --autostash || echo "No changes to pull"
        git add video_history.json
        git commit -m "Update video history from manual run [skip ci]" || echo "No changes to commit"
        git push origin main || echo "Failed to push history"

    - name: Zip Generated Videos
      if: always()
      id: zip_step
      run: |
        # Generar nombre con fecha (ej: videos_2024-04-20_23-15.zip)
        FILE_NAME="videos_$(date +'%Y-%m-%d_%H-%M').zip"
        echo "filename=$FILE_NAME" >> $GITHUB_OUTPUT
        
        mkdir -p output
        cd output
        zip -r "../$FILE_NAME" . || echo "Zip empty or failed"
        cd ..

    - name: Upload Final Bundle
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.zip_step.outputs.filename }}
        path: ${{ steps.zip_step.outputs.filename }}
        retention-days: 5
