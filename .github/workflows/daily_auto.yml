name: Daily AutoShorts Generator

on:
  schedule:
    - cron: '0 10 * * *' # 10:00 UTC = 7:00 AM Argentina
  workflow_dispatch:

jobs:
  automate:
    name: Generate Daily Videos
    runs-on: ubuntu-latest
    timeout-minutes: 50
    
    permissions:
      actions: write
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ffmpeg zip
        # Fix ImageMagick security policy
        find /etc/ImageMagick* -name "policy.xml" -exec sudo sed -i 's/none/read,write/g' {} +

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_ci.txt

    - name: Verify environment
      run: |
        echo "=== Python Version ==="
        python --version
        echo "=== FFmpeg Version ==="
        ffmpeg -version | head -1
        echo "=== Disk Space ==="
        df -h /
        echo "=== RAM ==="
        free -h
        echo "=== Font Check ==="
        ls -la assets/fonts/ || echo "No fonts directory found!"

    - name: Run Daily Generation
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        WATERMARK_TEXT: "@AIShortsGenerator"
        LANGUAGE: "es"
        VIDEO_COUNT: "2"
        IMAGEMAGICK_BINARY: /usr/bin/convert
      run: python daily_generation.py

    - name: Commit & Push History
      continue-on-error: true
      run: |
        git config user.name "AutoShorts Bot"
        git config user.email "actions@github.com"
        git pull origin main --rebase || echo "No changes to pull"
        git add video_history.json
        git commit -m "Update video history [skip ci]" || echo "No changes to commit"
        git push origin main || echo "Failed to push history"

    - name: Zip All Videos
      if: always()
      run: |
        if [ -d "output" ] && [ "$(ls -A output)" ]; then
          cd output
          zip -r ../daily_videos.zip .
          cd ..
        else
          echo "No files found in output directory to zip."
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: DAILY_VIDEOS
        path: daily_videos.zip
        if-no-files-found: warn
        retention-days: 3
